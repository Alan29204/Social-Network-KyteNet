services:
  postgres:
    container_name: postgres_datn
    image: postgres:latest
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: social-network-SNet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app-network
    restart: unless-stopped

  redis:
    container_name: redis_datn
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 200mb --maxmemory-policy noeviction
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb_datn
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/index
    networks:
      - app-network
    restart: always

  # ── SeaweedFS: Distributed File Storage (all-in-one) ──
  seaweedfs:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs_datn
    command: "server -master -volume -filer -s3 -s3.config=/etc/seaweedfs/s3.json"
    ports:
      - "9333:9333"
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9333/cluster/status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - seaweed_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json
    networks:
      - app-network
    restart: unless-stopped

