<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kytenet-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="KyteNet - Mạng xã hội kết nối thông minh. Chia sẻ khoảnh khắc, kết nối cộng đồng."
    />
    <meta name="theme-color" content="#7C3AED" />
    <meta property="og:title" content="KyteNet Social Network" />
    <meta property="og:description" content="Mạng xã hội kết nối thông minh" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>KyteNet - Social Network</title>
    <script>
      (function () {
        const theme = localStorage.getItem('vite-ui-theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          // System preference
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>

  <body
    class="overscroll-none bg-background text-foreground min-h-screen w-full transition-colors duration-200"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
